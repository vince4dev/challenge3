<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>

  <body>
    <main class="container">
      <article class="card">
        <picture class="avatar">
          <img
            src="./assets/images/avatar-jessica.jpeg"
            alt="Portrait of Jessica Randall"
          />
        </picture>

        <div class="card__user">
          <h1 class="card__name">Jessica Randall</h1>
          <p class="card__location">London, United Kingdom</p>
        </div>

        <p class="card__job">"Front-end developer and avid reader."</p>

        <div id="link-description" class="sr-only">
          These links to social profiles open in new tabs.
        </div>

        <ul class="card__link" role="list">
          <li>
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-describedby="link-description"
              >Github</a
            >
          </li>
          <li>
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-describedby="link-description"
              >Frontend Mentor</a
            >
          </li>
          <li>
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-describedby="link-description"
              >LinkedIn</a
            >
          </li>
          <li>
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-describedby="link-description"
              >Twitter</a
            >
          </li>
          <li>
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-describedby="link-description"
              >Instagram</a
            >
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
